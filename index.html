<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatima's Elite 20th 👑</title>
    <style>
        :root { --p: #ff85a1; --dp: #f72585; --g: #ffd700; --b: #0a0a0a; --w: #ffffff; }
        body { background: var(--b); color: var(--w); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #auth-screen { text-align: center; z-index: 100; }
        .pink-input { background: rgba(255,133,161,0.1); border: 2px solid var(--p); color: white; padding: 15px; border-radius: 15px; text-align: center; width: 220px; outline: none; box-shadow: 0 0 15px var(--p); }
        #countdown-screen { display: none; font-size: 8rem; color: var(--g); text-shadow: 0 0 30px var(--g); font-weight: bold; }
        #main-system { display: none; width: 90%; max-width: 500px; text-align: center; padding: 20px 0; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 30px; padding: 25px; border: 1px solid var(--p); box-shadow: 0 0 40px rgba(247, 37, 133, 0.2); }
        .hbd-text { font-size: 2.2rem; font-weight: 900; background: linear-gradient(45deg, var(--p), var(--g), var(--dp)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .img-item { width: 100%; height: 150px; object-fit: cover; border-radius: 15px; border: 2px solid var(--p); }
        
        /* تصميم صندوق الرسائل */
        .message-box { margin-top: 30px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; }
        textarea { width: 90%; height: 80px; background: transparent; border: 1px solid var(--p); color: white; border-radius: 10px; padding: 10px; resize: none; outline: none; margin-top: 10px; text-align: right; }
        .btn { background: linear-gradient(45deg, var(--p), var(--dp)); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
        #status { font-size: 0.8rem; margin-top: 10px; color: var(--g); }

        .heart { position: fixed; top: -10%; animation: fall linear forwards; z-index: 50; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="font-size: 3rem;">🌸</div>
        <h2 style="color: var(--p);">أهلاً بصديقات فاطمة الرهيبات</h2>
        <input type="password" id="pass" class="pink-input" placeholder="كلمة السر">
        <br><br>
        <button class="btn" onclick="unlock()">دخول 👑</button>
    </div>

    <div id="countdown-screen">10</div>

    <div id="main-system">
        <div class="glass-card">
            <div class="hbd-text">It's My 20th Birthday! ✨</div>
            <p style="color: var(--p); font-weight: bold; margin-top: 10px;">أهلاً بكنّ في عالمي الوردي 💖</p>
            <p style="font-size: 0.9rem; line-height: 1.6;">
                كبرتُ عاماً وكبرت أحلامي معي.. <br>
                اليوم أتممتُ العشرين بوجودكنّ حولي. <br>
                اتركي لي رسالة للذكرى تصلني على بريدي!
            </p>

            <audio id="bg-music" loop preload="auto">
                <source src="https://files.catbox.moe/cpw960.mp3" type="audio/mpeg">
            </audio>

            <div class="gallery">
                <img src="jpg.1.jpeg" class="img-item">
                <img src="jpg.2.jpeg" class="img-item">
                <img src="jpg.3.jpeg" class="img-item">
                <img src="jpg.4.jpeg" class="img-item">
            </div>

            <div class="message-box">
                <form id="my-form" action="https://formspree.io/f/xpqoqooq" method="POST">
                    <p style="margin:0; font-size: 0.9rem;">اكتبي رسالتكِ هنا ✍️</p>
                    <textarea name="message" required placeholder="ماذا تودين أن تقولي لفاطمة؟"></textarea>
                    <button id="submit-btn" type="submit" class="btn" style="padding: 8px 20px; font-size: 0.8rem;">إرسال للإيميل 💌</button>
                </form>
                <p id="status"></p>
            </div>
            
            <p style="font-size: 0.7rem; color: var(--g); margin-top: 20px;">Securely Developed by Fatima 👩‍💻</p>
        </div>
    </div>

    <script>
        function unlock() {
            if(document.getElementById('pass').value === "fatima20") {
                document.getElementById('bg-music').play();
                document.getElementById('auth-screen').style.display = 'none';
                startCD();
            } else { alert("رمز الدخول: fatima20"); }
        }

        function startCD() {
            const s = document.getElementById('countdown-screen');
            s.style.display = 'block';
            let c = 10;
            const t = setInterval(() => {
                c--; s.innerText = c;
                if(c === 0) { clearInterval(t); s.style.display = 'none'; showMain(); }
            }, 1000);
        }

        function showMain() {
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('bg-music').play();
            setInterval(createHearts, 300);
        }

        // التعامل مع إرسال النموذج برمجياً لمنع إعادة تحميل الصفحة
        var form = document.getElementById("my-form");
        async function handleSubmit(event) {
          event.preventDefault();
          var status = document.getElementById("status");
          var data = new FormData(event.target);
          fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
          }).then(response => {
            if (response.ok) {
              status.innerHTML = "تم الإرسال بنجاح! شكراً لكِ 💖";
              form.reset();
            } else {
              status.innerHTML = "حدث خطأ في الإرسال.";
            }
          }).catch(error => {
            status.innerHTML = "هناك مشكلة في الاتصال.";
          });
        }
        form.addEventListener("submit", handleSubmit);

        function createHearts() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = ["🌸", "💖", "✨", "👑"][Math.floor(Math.random()*4)];
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = "25px";
            h.style.animationDuration = "3s";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 3000);
        }
    </script>
</body>
</html>
