<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatima's Imperial 20th 👑</title>
    <style>
        :root { 
            --red: #7b0000; /* أحمر إمبراطوري عميق */
            --gold: #c5a059; 
            --bright-gold: #ffd700;
            --black: #0a0a0a;
        }
        
        body { 
            background: var(--red); /* الخلفية الأساسية حمراء فخمة */
            background: radial-gradient(circle, #8b0000 0%, #4a0000 100%);
            color: white; 
            font-family: 'Times New Roman', serif;
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* واجهة الدخول */
        #auth-screen { text-align: center; z-index: 100; }
        .imperial-input { 
            background: rgba(0,0,0,0.3); border: 2px solid var(--gold); 
            color: white; padding: 15px; border-radius: 0; text-align: center; 
            width: 250px; outline: none; box-shadow: 0 0 15px var(--gold);
            font-size: 1.2rem;
        }

        #countdown-screen { display: none; font-size: 10rem; color: var(--bright-gold); text-shadow: 0 0 40px var(--bright-gold); z-index: 100; }

        /* الواجهة الرئيسية */
        #main-system { display: none; width: 90%; max-width: 500px; text-align: center; z-index: 100; animation: fadeIn 2s; }
        .dynasty-card { 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); 
            border: 3px double var(--gold); padding: 30px; border-radius: 5px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .hbd-text { 
            font-size: 2.5rem; letter-spacing: 3px;
            background: linear-gradient(to right, var(--gold), #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 25px 0; }
        .img-item { width: 100%; height: 180px; object-fit: cover; border: 2px solid var(--gold); transition: 0.3s; }
        .img-item:hover { transform: scale(1.05); border-color: var(--bright-gold); }

        /* الرسائل */
        .message-box { margin-top: 20px; background: rgba(139,0,0,0.2); padding: 15px; border: 1px solid var(--gold); }
        textarea { width: 90%; height: 80px; background: rgba(0,0,0,0.5); border: 1px solid var(--gold); color: white; padding: 10px; resize: none; outline: none; text-align: right; }

        .btn-imperial { 
            background: var(--gold); color: black; border: none; padding: 12px 30px; 
            font-weight: bold; cursor: pointer; margin-top: 15px; letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .btn-imperial:hover { background: var(--bright-gold); transform: translateY(-2px); }

        /* تساقط العناصر */
        .particle { position: fixed; top: -10%; animation: fall linear forwards; z-index: 50; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="font-size: 4rem;">🏮</div>
        <h2 style="color: var(--gold); letter-spacing: 3px;">IMPERIAL ACCESS</h2>
        <input type="password" id="pass" class="imperial-input" placeholder="ACCESS CODE">
        <br><br>
        <button class="btn-imperial" onclick="unlock()">INITIALIZE 👑</button>
    </div>

    <div id="countdown-screen">10</div>

    <div id="main-system">
        <div class="dynasty-card">
            <div class="hbd-text">THE 20th ANNIVERSARY</div>
            <p style="color: var(--gold); font-size: 1.2rem;">أهلاً بكنّ في القصر الإمبراطوري لـ فاطمة 👑</p>
            
            <audio id="bg-music" loop preload="auto">
                <source src="https://files.catbox.moe/cpw960.mp3" type="audio/mpeg">
            </audio>

            <div class="gallery">
                <img src="jpg.1.jpeg" class="img-item">
                <img src="jpg.2.jpeg" class="img-item">
                <img src="jpg.3.jpeg" class="img-item">
                <img src="jpg.4.jpeg" class="img-item">
            </div>

            <div class="message-box">
                <form id="my-form" action="https://formspree.io/f/xpqoqooq" method="POST">
                    <p style="margin:0; font-size: 0.9rem; color: var(--gold);">اكتبي رسالتكِ الإمبراطورية ✍️</p>
                    <textarea name="message" required placeholder="ماذا تودين أن تقولي لإمبراطورة اليوم؟"></textarea>
                    <br>
                    <button type="submit" class="btn-imperial" style="padding: 8px 20px; font-size: 0.8rem;">إرسال للإيميل 💌</button>
                </form>
                <p id="status" style="font-size: 0.8rem; color: var(--bright-gold); margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <script>
        function unlock() {
            if(document.getElementById('pass').value === "fatima20") {
                document.getElementById('bg-music').play().catch(e => console.log("Audio waiting"));
                document.getElementById('auth-screen').style.display = 'none';
                startCD();
            } else { alert("ACCESS DENIED"); }
        }

        function startCD() {
            const s = document.getElementById('countdown-screen');
            s.style.display = 'block';
            let c = 10;
            const t = setInterval(() => {
                c--; s.innerText = c;
                if(c === 0) { clearInterval(t); s.style.display = 'none'; showMain(); }
            }, 1000);
        }

        function showMain() {
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('bg-music').play();
            setInterval(createParticles, 300);
        }

        // Formspree
        var form = document.getElementById("my-form");
        form.addEventListener("submit", function(e) {
            e.preventDefault();
            var status = document.getElementById("status");
            var data = new FormData(e.target);
            fetch(e.target.action, {
                method: 'POST', body: data, headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) { status.innerHTML = "وصلت رسالتكِ أيتها الجميلة 💖"; form.reset(); }
                else { status.innerHTML = "حدث خطأ!"; }
            });
        });

        function createParticles() {
            const h = document.createElement('div');
            h.className = 'particle';
            h.innerHTML = ["🏮", "✨", "👑", "福", "喜"][Math.floor(Math.random()*5)];
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = "30px";
            h.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }
    </script>
</body>
</html>
